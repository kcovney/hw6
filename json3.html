<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Part 3: Filter the data</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <script>
        // make a place to put the songs
        const song_list_container = $("<div>", {
            id: "song_list_container"
        });
        $("body").append(song_list_container);

        // make a dropdown menu to select songs
        const song_dd_menu = $("<select>", {
            id: "song_dd_menu",
            name: "songs"
        });
        $("body").append(song_dd_menu);

        // make a button to filter songs by genre
        const button = $("<button>", {
            id: "filter_button",
            text: "Filter"
        });
        $("body").append(button);

        const filtered_song = $("<div>", {
            id: "filtered_song",
        });
        $("body").append(filtered_song);

        let songs;
        $.get("songs.json", function(data) {
            songs = data;
            const genres = new Set();
            data.forEach(song => {
                song.genres.forEach(genre => {
                    genres.add(genre);
                });
            });
            genres.forEach(genre => {
                const option = $("<option>", {
                    value: genre,
                    text: genre
                });
                song_dd_menu.append(option);
            });
            $("#filter_button").click(() => {
                document.getElementById('filtered_song').innerHTML = "";
                const selected_genre = $("#song_dd_menu").val()
                let selected_songs = "";
                data.forEach(song => {
                    if (song.genres.includes(selected_genre)) {
                        selected_songs += song.title + "<br>";
                    }
                });
                document.getElementById('filtered_song').innerHTML = selected_songs;
            });
        }, 'json');
    </script>
</body>

</html>
