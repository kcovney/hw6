<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Part 2: Read a JSON Object from a file</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <script>
        // make a place to put the songs
        const song_list_container = $("<div>", {
            id: "song_list_container"
        });
        $("body").append(song_list_container);

        // read the songs, and for each song, change it's field into valid html, 
        // then join the list into a string and add it to the body
        let songs;
        $.get("songs.json", function(data) {
            songs = data;
            const song_info = data.map(song => 
                "<h4>" + song.title + "</h4>" +
                "Artist: " + song.artist + "<br>" +
                "Genre: " + song.genres.join(", ") + "<br>" + 
                "Released " + song.year
            ).join("");
            document.getElementById('song_list_container').innerHTML = song_info;
        }, 'json');
    </script>
</body>

</html>
